name: Deploy esmuscafe to EC2

on:
  push:
    branches: [main, master]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 2. Build backend ─────────────────────────────────
      - name: Install & build backend
        working-directory: backend
        run: |
          npm ci
          npm run build

      # ── 3. Write frontend .env then build ────────────────
      #    VITE_API_URL is baked into the JS bundle at build time,
      #    so it must exist before `npm run build`
      - name: Write frontend .env
        run: |
          cat > frontend/.env << 'ENVEOF'
          VITE_API_URL=http://${{ secrets.EC2_HOST }}/api
          ENVEOF

      - name: Install & build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # ── 4. Write backend .env (before upload) ────────────
      - name: Write backend .env
        run: |
          cat > backend/.env << 'ENVEOF'
          PORT=${{ secrets.PORT }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          MONGODB_URI=${{ secrets.MONGODB_URI }}
          CLIENT_URL=${{ secrets.CLIENT_URL }}
          ENVEOF

      # ── 5. Set up SSH ─────────────────────────────────────
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # ── 6. Upload build artifacts to EC2 ─────────────────
      #    Source files stay in GitHub — EC2 only gets compiled output
      - name: Upload build to EC2
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} \
            "mkdir -p /home/ubuntu/Esmuscafe/backend /home/ubuntu/Esmuscafe/frontend/dist"

          # Backend: compiled JS + package files + .env
          rsync -az --delete \
            backend/dist/ \
            ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/Esmuscafe/backend/dist/

          rsync -az \
            backend/package.json \
            backend/package-lock.json \
            backend/.env \
            ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/Esmuscafe/backend/

          # Frontend: static files → Nginx serves from here
          rsync -az --delete \
            frontend/dist/ \
            ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/Esmuscafe/frontend/dist/

      # ── 7. Install prod deps on EC2 & restart PM2 ────────
      - name: Install & restart on EC2
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} << 'ENDSSH'
          set -e
          cd /home/ubuntu/Esmuscafe/backend

          npm ci --omit=dev

          if pm2 list | grep -q "esmuscafe-backend"; then
            pm2 restart esmuscafe-backend --update-env
          else
            pm2 start dist/main.js \
              --name "esmuscafe-backend" \
              --cwd /home/ubuntu/Esmuscafe/backend
          fi

          pm2 save
          echo "✅ esmuscafe deployed successfully"
          ENDSSH